version: "3.9"

# ─────────────────────────────────────────────
# QoL Cardiac — Docker Compose
# Usage : docker compose up -d
# ─────────────────────────────────────────────

services:
  qol-cardiac:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qol-cardiac
    restart: unless-stopped
    ports:
      - "8501:8501"        # Accès direct : http://localhost:8501
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - ./app.py:/app/app.py:ro          # Rechargement sans rebuild
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qol.rule=Host(`qol.medflowai.fr`)"
      - "traefik.http.routers.qol.entrypoints=websecure"
      - "traefik.http.routers.qol.tls.certresolver=letsencrypt"

  # ── Reverse proxy HTTPS (optionnel — pour domaine personnalisé) ──
  # Décommente si tu veux HTTPS automatique avec ton domaine
  # traefik:
  #   image: traefik:v3.0
